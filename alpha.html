<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Call Alpha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .title { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: #a855f7; }
    .status { font-size: 1.2rem; color: #888; margin-bottom: 2rem; }
    .status.active { color: #4ade80; }
    .status.connecting { color: #fbbf24; }
    .call-btn {
      width: 120px; height: 120px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white; font-size: 3rem; cursor: pointer;
      box-shadow: 0 0 40px rgba(124,58,237,0.4);
    }
    .call-btn.active {
      background: linear-gradient(135deg, #dc2626, #ef4444);
      box-shadow: 0 0 40px rgba(220,38,38,0.4);
    }
    .duration { font-size: 1rem; color: #666; margin-top: 1.5rem; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="title">Alpha</div>
  <div class="status" id="status">Tap the button to call</div>
  <button class="call-btn" id="callBtn" onclick="toggleCall()">📞</button>
  <div class="duration" id="duration"></div>

  <script>
    var vapiInstance = null;
    const assistant = "c10c277e-155a-484a-8d34-d28531baefc4";
    const apiKey = "14dd890b-d9a1-497b-a8de-a48c3fc6e22e";

    (function (d, t) {
      var g = document.createElement(t),
        s = d.getElementsByTagName(t)[0];
      g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      g.defer = true;
      g.async = true;
      s.parentNode.insertBefore(g, s);

      g.onload = function () {
        vapiInstance = window.vapiSDK.run({
          apiKey: apiKey,
          assistant: assistant,
          config: {
            hideButton: true,
            position: "bottom-right"
          }
        });

        vapiInstance.on('call-start', () => {
          document.getElementById('status').textContent = 'Connected — talk!';
          document.getElementById('status').className = 'status active';
          document.getElementById('callBtn').className = 'call-btn active';
          document.getElementById('callBtn').textContent = '✕';
          startTime = Date.now();
          timerInterval = setInterval(updateDuration, 1000);
        });

        vapiInstance.on('call-end', () => {
          document.getElementById('status').textContent = 'Call ended';
          document.getElementById('status').className = 'status';
          document.getElementById('callBtn').className = 'call-btn';
          document.getElementById('callBtn').textContent = '📞';
          clearInterval(timerInterval);
          setTimeout(() => {
            document.getElementById('status').textContent = 'Tap the button to call';
            document.getElementById('duration').textContent = '';
          }, 3000);
        });

        vapiInstance.on('speech-start', () => {
          document.getElementById('status').textContent = 'Alpha is speaking...';
          document.getElementById('status').className = 'status active';
        });

        vapiInstance.on('speech-end', () => {
          document.getElementById('status').textContent = 'Listening...';
          document.getElementById('status').className = 'status active';
        });

        vapiInstance.on('error', (err) => {
          console.error('Error:', err);
          document.getElementById('status').textContent = 'Error — try again';
          document.getElementById('status').className = 'status';
        });

        document.getElementById('status').textContent = 'Ready — tap to call';
      };
    })(document, "script");

    let startTime = null;
    let timerInterval = null;

    function toggleCall() {
      if (!vapiInstance) {
        document.getElementById('status').textContent = 'Loading...';
        return;
      }
      const btn = document.getElementById('callBtn');
      if (btn.classList.contains('active')) {
        vapiInstance.stop();
      } else {
        document.getElementById('status').textContent = 'Connecting...';
        document.getElementById('status').className = 'status connecting';
        vapiInstance.start();
      }
    }

    function updateDuration() {
      if (!startTime) return;
      const s = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('duration').textContent =
        String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }
  </script>
</body>
</html>
